[build]
  publish = "dist"
  command = "npm run build"

# SPA fallback: todas las rutas sirven index.html excepto archivos estáticos
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Manifest PWA: sin caché agresiva, sin restricciones
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json"
    X-Robots-Tag  = "noindex"

# Íconos PWA
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"
